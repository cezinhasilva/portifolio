name: 🎉 Deploy de Produção (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Pegando o código (Checkout)
        uses: actions/checkout@v3

      - name: 🟢 Configurando Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Instalando dependências e Gerando Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: 🚀 Subindo arquivos para a Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            backend/
            ci4/
            docker/
            node-app/
            wordpress/
